# Render Blueprint for Gather
# Deploys: managed Postgres + Node API + static React client.
# To use: push this repo to GitHub, then in Render dashboard:
#   New → Blueprint → connect this repo → apply.
#
# After first deploy you must:
#   1. Open the API service shell and run:
#        psql "$DATABASE_URL" -f schema.sql
#        npm run seed       # optional — only for demo data
#   2. Set ADMIN_SECRET in the API service env (auto-generated below).
#   3. Set VITE_API_URL on the client to the API service URL.

databases:
  - name: gather-db
    plan: free
    databaseName: gather
    user: gather

services:
  - type: web
    name: gather-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gather-db
          property: connectionString
      - key: PORT
        value: 4000
      - key: CLIENT_ORIGIN
        sync: false # set manually to the deployed client URL
      - key: ADMIN_SECRET
        generateValue: true

  - type: web
    name: gather-client
    runtime: static
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false # set manually to the deployed API URL
    routes:
      # SPA fallback so react-router routes resolve on refresh
      - type: rewrite
        source: /*
        destination: /index.html
